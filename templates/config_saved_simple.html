<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniFusion - 配置已保存</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #333;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: #059669;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .message {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .message h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .message p {
            color: #64748b;
            font-size: 0.95rem;
        }
        
        .config-summary {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .config-summary h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 15px;
        }
        
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }
        
        .config-item:last-child {
            border-bottom: none;
        }
        
        .config-label {
            color: #4b5563;
        }
        
        .config-value {
            font-weight: 500;
            color: #1e293b;
            max-width: 60%;
            word-break: break-all;
            text-align: right;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .auto-redirect {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        @media (max-width: 640px) {
            .content {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ 配置已保存</h1>
            <p>CogniFusion 配置更新成功</p>
        </div>
        
        <div class="content">
            <div class="message">
                <h2>配置保存成功！</h2>
                <p>您的 CogniFusion 配置已成功保存并生效。</p>
            </div>
            
            <div class="config-summary">
                <h3>配置摘要</h3>
                <div class="config-item">
                    <span class="config-label">用户数据目录</span>
                    <span class="config-value">{{ config.user_data_dir }}</span>
                </div>
                <div class="config-item">
                    <span class="config-label">浏览器扩展</span>
                    <span class="config-value">{{ config.extensions|length }} 个</span>
                </div>
                <div class="config-item">
                    <span class="config-label">Ollama API</span>
                    <span class="config-value">{{ config.ollama_api }}</span>
                </div>
                <div class="config-item">
                    <span class="config-label">Ollama 模型</span>
                    <span class="config-value">{{ config.ollama_model }}</span>
                </div>
                <div class="config-item">
                    <span class="config-label">自动打开浏览器</span>
                    <span class="config-value">{{ "是" if config.auto_open_browser else "否" }}</span>
                </div>
            </div>
            
            <div class="button-group">
                <a href="/" class="btn btn-primary">返回状态页</a>
                <a href="/config" class="btn btn-secondary">修改配置</a>
            </div>
            
            <div class="auto-redirect" id="redirect-countdown">
                5秒后自动返回状态页面...
            </div>
        </div>
    </div>
    
    <script>
        // 自动重定向
        let countdown = 5;
        const countdownElement = document.getElementById('redirect-countdown');
        
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.textContent = `${countdown}秒后自动返回状态页面...`;
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
